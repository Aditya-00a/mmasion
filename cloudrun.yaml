apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mmasion
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/mmasion/mmasion:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: MMASION_PROVIDER
              value: "ollama"
            - name: MMASION_OLLAMA_MODEL
              value: "gemma3:12b"
            - name: MMASION_MONITOR_PROVIDER
              value: "gemini"
            - name: MMASION_VERTEX_MODEL
              value: "gemini-2.5-flash"
            - name: MMASION_VERTEX_LOCATION
              value: "us-central1"
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
